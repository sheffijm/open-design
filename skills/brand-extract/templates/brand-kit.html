<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brand Kit</title>
<!--
  Self-contained brand-kit page. The daemon's brand-kit renderer replaces the
  __OD_BRAND_PAYLOAD__ token below with a JSON payload { status, brand, assets }.
  Everything renders from that single embedded blob — no external requests,
  so it works under the FileViewer's sandboxed URL-load iframe. While status
  is "extracting" the page softly reloads itself so the user watches the kit
  fill in as the agent writes brand.json and re-runs `od brand preview`.
-->
<script id="od-brand-payload" type="application/json">__OD_BRAND_PAYLOAD__</script>
<style>
  :root {
    --paper: #faf9f5;
    --surface: #ffffff;
    --ink: #1a1a18;
    --ink-mute: #57564f;
    --ink-faint: #8a887f;
    --line: #e7e5dc;
    --line-soft: #efeee7;
    --accent: #c96442;
    --ok: #3d7a4f;
    --err: #b4453a;
    --radius: 14px;
    --font-display: ui-serif, Georgia, 'Times New Roman', serif;
    --font-body: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 40px 28px 96px; }
  a { color: inherit; }

  header.kit-head { display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .kit-title { font-family: var(--font-display); font-size: 40px; line-height: 1.05; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
  .kit-tagline { margin: 6px 0 0; font-size: 18px; color: var(--ink-mute); }
  .kit-source { margin-top: 6px; display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--ink-faint); text-decoration: none; }
  .kit-source:hover { color: var(--accent); }
  .head-actions { display: flex; align-items: center; gap: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 10px; padding: 7px 12px; font-size: 13px; text-decoration: none; cursor: pointer; transition: border-color .14s ease; }
  .btn:hover { border-color: var(--accent); }

  .status-pill { display: inline-flex; align-items: center; gap: 7px; border-radius: 999px; padding: 4px 11px 4px 9px; font-size: 12px; font-weight: 500; border: 1px solid var(--line); background: var(--surface); color: var(--ink-mute); }
  .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .status-pill.extracting .dot { animation: pulse 1.1s ease-in-out infinite; }
  .status-pill.ready .dot { background: var(--ok); }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: .35; transform: scale(.7);} }

  .sec { margin-top: 40px; }
  .sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-faint); margin: 0 0 12px; }
  .grid-2 { display: grid; gap: 28px; grid-template-columns: 1fr; }
  .grid-top { display: grid; gap: 28px; grid-template-columns: 1fr; }
  @media (min-width: 860px) {
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-top { grid-template-columns: 1fr 2fr; }
  }
  .card { border: 1px solid var(--line-soft); background: var(--surface); border-radius: var(--radius); padding: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }

  /* Logo */
  .logo-stage { display: flex; min-height: 158px; align-items: center; justify-content: center; border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 28px; }
  .logo-stage img { max-height: 92px; max-width: 100%; object-fit: contain; }
  .logo-empty { display: flex; min-height: 158px; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1px dashed var(--line); border-radius: var(--radius); color: var(--ink-faint); font-size: 14px; }
  .logo-thumbs { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .logo-thumb { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--line-soft); border-radius: 9px; padding: 6px; cursor: pointer; }
  .logo-thumb.active { border-color: var(--accent); }
  .logo-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .logo-notes { margin-top: 10px; font-size: 12px; color: var(--ink-faint); }

  /* Type */
  .type-row { border: 1px solid var(--line-soft); border-radius: 12px; background: var(--surface); padding: 16px 18px; }
  .type-row + .type-row { margin-top: 12px; }
  .type-meta { display: flex; align-items: baseline; justify-content: space-between; gap: 14px; }
  .type-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); }
  .type-font { font-size: 12px; color: var(--ink-mute); text-align: right; }
  .type-font .dim { color: var(--ink-faint); }
  .type-sample { margin: 8px 0 0; line-height: 1.1; }

  /* Palette */
  .palette { display: grid; gap: 12px; grid-template-columns: repeat(2, 1fr); }
  @media (min-width: 560px) { .palette { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 920px) { .palette { grid-template-columns: repeat(7, 1fr); } }
  .swatch { overflow: hidden; border: 1px solid var(--line-soft); border-radius: 12px; background: var(--surface); box-shadow: 0 1px 2px rgba(0,0,0,.03); }
  .swatch-chip { height: 92px; display: flex; align-items: flex-end; padding: 8px; }
  .swatch-chip .hex { font-family: var(--font-mono); font-size: 11px; }
  .swatch-body { padding: 9px 10px 11px; }
  .swatch-name { font-size: 13px; font-weight: 500; line-height: 1.2; }
  .swatch-role { font-size: 11px; color: var(--ink-faint); margin-top: 1px; }
  .swatch-usage { font-size: 11px; color: var(--ink-mute); margin-top: 5px; line-height: 1.35; }

  /* Voice */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .voice-tone { margin: 12px 0 0; font-size: 14px; color: var(--ink-mute); line-height: 1.55; }
  .pillars { margin: 12px 0 0; padding: 0; list-style: none; font-size: 14px; }
  .pillars li { display: flex; gap: 8px; margin-top: 4px; }
  .vocab { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; border-top: 1px solid var(--line-soft); padding-top: 12px; font-size: 12px; }
  .vocab .k { font-weight: 600; }
  .vocab .use .k { color: var(--ok); }
  .vocab .avoid .k { color: var(--err); }
  .vocab .v { margin-top: 4px; color: var(--ink-mute); }

  /* Imagery */
  .imagery p { margin: 0; font-size: 14px; }
  .imagery p + p { margin-top: 6px; color: var(--ink-mute); }
  .imagery .k { font-weight: 600; color: var(--ink); }
  .posture { margin-top: 12px; border-top: 1px solid var(--line-soft); padding-top: 12px; }
  .posture ul { margin: 6px 0 0; padding-left: 18px; font-size: 12px; color: var(--ink-mute); }
  .posture ul li { margin-top: 2px; }

  /* Brand assets */
  .assets { display: grid; gap: 16px; grid-template-columns: 1fr; }
  @media (min-width: 620px) { .assets { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 920px) { .assets { grid-template-columns: 1fr 1fr 1fr; } }
  .asset { border: 1px solid var(--line-soft); border-radius: 12px; background: var(--surface); overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: border-color .14s ease, transform .14s ease; }
  .asset:hover { border-color: var(--accent); transform: translateY(-1px); }
  .asset.pending { opacity: .55; pointer-events: none; }
  .asset-frame { aspect-ratio: 16 / 10; background: var(--line-soft); position: relative; overflow: hidden; }
  .asset-frame iframe { position: absolute; top: 0; left: 0; width: 200%; height: 200%; border: 0; transform: scale(.5); transform-origin: top left; pointer-events: none; background: #fff; }
  .asset-meta { padding: 11px 13px; }
  .asset-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .asset-name .open { font-size: 11px; color: var(--accent); }
  .asset-desc { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }

  /* skeleton */
  .skel { background: linear-gradient(90deg, var(--line-soft) 25%, #f6f5ef 37%, var(--line-soft) 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  .skel-line { height: 12px; margin-top: 8px; }
  .muted { color: var(--ink-faint); font-size: 13px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
(function () {
  function payload() {
    var el = document.getElementById('od-brand-payload');
    try { return JSON.parse(el && el.textContent ? el.textContent : '{}'); }
    catch (e) { return {}; }
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }
  function arr(v) { return Array.isArray(v) ? v : []; }
  function role(brand, r, fb) {
    var c = arr(brand.colors).find(function (x) { return x && x.role === r; });
    return c && c.hex ? c.hex : fb;
  }
  function isLight(hex) {
    if (!/^#[0-9a-fA-F]{6}$/.test(hex || '')) return true;
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return (r*0.299 + g*0.587 + b*0.114) > 150;
  }
  function fontStack(spec) {
    var fams = [spec && spec.family].concat(arr(spec && spec.fallbacks)).filter(Boolean);
    if (!fams.length) fams = ['ui-sans-serif','system-ui','sans-serif'];
    return fams.map(function (f) { return /\s/.test(f) ? '"' + f + '"' : f; }).join(', ');
  }

  var data = payload();
  var brand = data.brand || {};
  var status = data.status || 'extracting';
  var assets = arr(data.assets);
  var extracting = status === 'extracting';

  var colors = arr(brand.colors);
  var bg = role(brand, 'background', '#ffffff');
  var fg = role(brand, 'foreground', '#1a1a18');
  var muted = role(brand, 'muted', '#57564f');
  var accent = role(brand, 'accent', '#c96442');

  // Apply brand accent/ink to the page chrome so the kit feels on-brand.
  document.documentElement.style.setProperty('--accent', accent);

  var typo = brand.typography || {};
  var googleLinks = [typo.display, typo.body, typo.mono]
    .map(function (s) { return s && s.googleFontsUrl; })
    .filter(function (u, i, a) { return u && a.indexOf(u) === i; });
  googleLinks.forEach(function (u) {
    var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = u; document.head.appendChild(l);
  });

  function sectionTitle(t) { return '<h2 class="sec-title">' + esc(t) + '</h2>'; }

  function logoHtml() {
    var primary = brand.logo && brand.logo.primary;
    var cands = [primary].concat(arr(brand.logo && brand.logo.alternates)).filter(Boolean);
    if (!cands.length) {
      return '<div class="logo-empty">' + (extracting
        ? '<div class="skel" style="width:60%;height:48px"></div><span class="muted">Looking for a logo…</span>'
        : 'No logo found') + '</div>';
    }
    var thumbs = cands.length > 1 ? '<div class="logo-thumbs">' + cands.map(function (c, i) {
      return '<button class="logo-thumb' + (i===0?' active':'') + '" data-src="' + esc(c) + '" style="background:' + esc(bg) + '"><img src="' + esc(c) + '" alt=""></button>';
    }).join('') + '</div>' : '';
    var notes = brand.logo && brand.logo.notes ? '<p class="logo-notes">' + esc(brand.logo.notes) + '</p>' : '';
    return '<div class="logo-stage" id="logo-stage" style="background:' + esc(bg) + '">' +
      '<img id="logo-img" src="' + esc(cands[0]) + '" alt="' + esc(brand.name || 'logo') + '"></div>' + thumbs + notes;
  }

  function typeHtml() {
    var rows = [
      { label: 'Display', spec: typo.display, sample: brand.name || 'Aa', size: '40px', weight: 600, color: fg },
      { label: 'Body', spec: typo.body, sample: brand.tagline || brand.description || 'The quick brown fox jumps over the lazy dog.', size: '17px', weight: 400, color: muted },
    ];
    if (typo.mono) rows.push({ label: 'Mono', spec: typo.mono, sample: 'const brand = await extract(url);', size: '14px', weight: 400, color: fg });
    if (!typo.display && !typo.body) {
      return '<div class="type-row"><div class="skel skel-line" style="width:50%"></div><div class="skel" style="height:34px;margin-top:10px;width:70%"></div></div>';
    }
    return rows.map(function (r) {
      var spec = r.spec || {};
      var note = spec.googleFontsUrl ? '' : ' <span class="dim">· proprietary, shown via fallback</span>';
      var weights = arr(spec.weights).length ? ' · ' + arr(spec.weights).join('/') : '';
      return '<div class="type-row"><div class="type-meta">' +
        '<span class="type-label">' + esc(r.label) + '</span>' +
        '<span class="type-font">' + esc(spec.family || '—') + esc(weights) + note + '</span></div>' +
        '<p class="type-sample" style="font-family:' + fontStack(spec) + ';font-size:' + r.size + ';font-weight:' + r.weight + ';color:' + esc(r.color) + '">' + esc(r.sample) + '</p></div>';
    }).join('');
  }

  function paletteHtml() {
    if (!colors.length) {
      var sk = '';
      for (var i = 0; i < 7; i++) sk += '<div class="swatch"><div class="skel" style="height:92px"></div><div class="swatch-body"><div class="skel skel-line" style="width:70%"></div></div></div>';
      return '<div class="palette">' + sk + '</div>';
    }
    return '<div class="palette">' + colors.map(function (c) {
      var light = isLight(c.hex);
      return '<div class="swatch"><div class="swatch-chip" style="background:' + esc(c.hex) + '">' +
        '<span class="hex" style="color:' + (light ? 'rgba(0,0,0,.65)' : 'rgba(255,255,255,.9)') + '">' + esc(c.hex) + '</span></div>' +
        '<div class="swatch-body"><div class="swatch-name">' + esc(c.name || c.role) + '</div>' +
        '<div class="swatch-role">' + esc(c.role || '') + '</div>' +
        (c.usage ? '<div class="swatch-usage">' + esc(c.usage) + '</div>' : '') + '</div></div>';
    }).join('') + '</div>';
  }

  function voiceHtml() {
    var v = brand.voice || {};
    if (!arr(v.adjectives).length && !v.tone) {
      return '<div class="card"><div class="skel skel-line" style="width:40%"></div><div class="skel skel-line" style="width:85%"></div><div class="skel skel-line" style="width:75%"></div></div>';
    }
    var chips = arr(v.adjectives).map(function (a) {
      return '<span class="chip" style="background:' + esc(accent) + '1f;color:' + esc(accent) + '">' + esc(a) + '</span>';
    }).join('');
    var pillars = arr(v.messagingPillars).length ? '<ul class="pillars">' + arr(v.messagingPillars).map(function (p) {
      return '<li><span style="color:' + esc(accent) + '">—</span><span>' + esc(p) + '</span></li>';
    }).join('') + '</ul>' : '';
    var vocab = (v.vocabulary && (arr(v.vocabulary.use).length || arr(v.vocabulary.avoid).length))
      ? '<div class="vocab"><div class="use"><div class="k">Use</div><div class="v">' + esc(arr(v.vocabulary.use).join(' · ')) + '</div></div>' +
        '<div class="avoid"><div class="k">Avoid</div><div class="v">' + esc(arr(v.vocabulary.avoid).join(' · ')) + '</div></div></div>' : '';
    return '<div class="card"><div class="chips">' + chips + '</div>' +
      (v.tone ? '<p class="voice-tone">' + esc(v.tone) + '</p>' : '') + pillars + vocab + '</div>';
  }

  function imageryHtml() {
    var im = brand.imagery || {};
    var lay = brand.layout || {};
    if (!im.style && !arr(lay.postureRules).length) {
      return '<div class="card"><div class="skel skel-line" style="width:90%"></div><div class="skel skel-line" style="width:70%"></div></div>';
    }
    var posture = arr(lay.postureRules).length ? '<div class="posture"><div class="type-label">Layout posture</div><ul>' +
      arr(lay.postureRules).map(function (r) { return '<li>' + esc(r) + '</li>'; }).join('') + '</ul></div>' : '';
    return '<div class="card imagery">' +
      (im.style ? '<p>' + esc(im.style) + '</p>' : '') +
      (arr(im.subjects).length ? '<p><span class="k">Subjects:</span> ' + esc(arr(im.subjects).join(', ')) + '</p>' : '') +
      (im.treatment ? '<p><span class="k">Treatment:</span> ' + esc(im.treatment) + '</p>' : '') +
      (arr(im.avoid).length ? '<p><span class="k" style="color:var(--err)">Avoid:</span> ' + esc(arr(im.avoid).join(', ')) + '</p>' : '') +
      posture + '</div>';
  }

  function assetsHtml() {
    if (!assets.length) return '';
    return '<section class="sec">' + sectionTitle('Brand assets') +
      '<p class="muted" style="margin:-6px 0 14px">' + (extracting
        ? 'Generated once extraction finishes — click any tile to preview the full page.'
        : 'Click any tile to preview the full page; everything is colored from this one brand.') + '</p>' +
      '<div class="assets">' + assets.map(function (a) {
        var pending = !a.available;
        var inner = pending
          ? '<div class="asset-frame"><div class="skel" style="position:absolute;inset:0"></div></div>'
          : '<div class="asset-frame"><iframe src="' + esc(a.href) + '" loading="lazy" tabindex="-1" aria-hidden="true"></iframe></div>';
        var tag = pending ? 'div' : 'a';
        var href = pending ? '' : ' href="' + esc(a.href) + '" target="_top"';
        return '<' + tag + ' class="asset' + (pending ? ' pending' : '') + '"' + href + '>' + inner +
          '<div class="asset-meta"><div class="asset-name">' + esc(a.label) + (pending ? '' : '<span class="open">Preview →</span>') + '</div>' +
          (a.desc ? '<div class="asset-desc">' + esc(a.desc) + '</div>' : '') + '</div></' + tag + '>';
      }).join('') + '</div></section>';
  }

  var systemHref = (data.system && data.system.href) || null;
  var brandMdHref = (data.brandMd && data.brandMd.href) || null;

  var html = '' +
    '<header class="kit-head"><div>' +
      '<h1 class="kit-title" style="font-family:' + fontStack(typo.display || {}) + '">' + esc(brand.name || (data.host || 'Brand')) + '</h1>' +
      (brand.tagline ? '<p class="kit-tagline">' + esc(brand.tagline) + '</p>' : '') +
      (brand.sourceUrl ? '<a class="kit-source" href="' + esc(brand.sourceUrl) + '" target="_top">' + esc(brand.sourceUrl) + ' ↗</a>' : '') +
    '</div><div class="head-actions">' +
      '<span class="status-pill ' + (extracting ? 'extracting' : 'ready') + '"><span class="dot"></span>' + (extracting ? 'Extracting…' : 'Brand ready') + '</span>' +
      (brandMdHref ? '<a class="btn" href="' + esc(brandMdHref) + '" target="_top">BRAND.md</a>' : '') +
      (systemHref ? '<a class="btn" href="' + esc(systemHref) + '" target="_top">Design system ↗</a>' : '') +
    '</div></header>' +
    '<div class="sec grid-top"><section><h2 class="sec-title">Logo</h2>' + logoHtml() + '</section>' +
      '<section><h2 class="sec-title">Typography</h2>' + typeHtml() + '</section></div>' +
    '<section class="sec">' + sectionTitle('Palette') + paletteHtml() + '</section>' +
    '<div class="sec grid-2"><section><h2 class="sec-title">Voice &amp; tone</h2>' + voiceHtml() + '</section>' +
      '<section><h2 class="sec-title">Imagery &amp; layout</h2>' + imageryHtml() + '</section></div>' +
    assetsHtml();

  document.getElementById('root').innerHTML = html;

  // Logo thumbnail switcher.
  var img = document.getElementById('logo-img');
  Array.prototype.forEach.call(document.querySelectorAll('.logo-thumb'), function (b) {
    b.addEventListener('click', function () {
      if (img) img.src = b.getAttribute('data-src');
      Array.prototype.forEach.call(document.querySelectorAll('.logo-thumb'), function (x) { x.classList.remove('active'); });
      b.classList.add('active');
    });
  });

  // While extraction is live, softly reload so the page fills in as the agent
  // updates brand.json + re-runs `od brand preview`. Stops the moment the
  // payload reports a ready brand.
  if (extracting) {
    setTimeout(function () { try { location.reload(); } catch (e) {} }, 3500);
  }
})();
</script>
</body>
</html>
